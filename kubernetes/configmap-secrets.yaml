apiVersion: v1
kind: ConfigMap
metadata:
  name: famehub-config
  namespace: famehub
data:
  NODE_ENV: "production"
  PORT: "5000"
  DATABASE_URL: "postgres://postgres:postgres_password@postgres-service:5432/famehub"
  REDIS_URL: "redis://redis-service:6379"
  KAFKA_BROKERS: "kafka-service:9092"
  BBB_URL: "https://demo.bigbluebutton.org/bigbluebutton/api"
  ATTENDANCE_THRESHOLD_SECONDS: "60"
  CSRF_ENABLED: "true"
---
apiVersion: v1
kind: Secret
metadata:
  name: famehub-secrets
  namespace: famehub
type: Opaque
data:
  # Base64 encoded values for JWT_SECRET and BBB_SECRET
  # JWT_SECRET: super_jwt_secret_key_1234567890!
  JWT_SECRET: c3VwZXJfand0X3NlY3JldF9rZXlfMTIzNDU2Nzg5MCE=
  # BBB_SECRET: bbb_secret_key_placeholder
  BBB_SECRET: YmJiX3NlY3JldF9rZXlfcGxhY2Vob2xkZXI=
